<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CanOrNot MDAC Helper</title>

<style>
body {
  font-family: Arial;
  max-width: 760px;
  margin: 30px auto;
  padding: 20px;
  background: #fffdf5;
}

.section {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  background: #e67e22;
  color: white;
  cursor: pointer;
}

.note {
  background: #fff3cd;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🦀 CanOrNot MDAC Helper</h1>

<p class="note">
🔒 Your data stays on your device.<br>
Nothing is uploaded. Everything is stored in your browser only.<br><br>
Built by Giuliano Comperato (Singapore)
</p>

<button onclick="openMDAC()">Open Official MDAC Form</button>
<button onclick="showSavedData()">View Saved Data</button>
<button onclick="clearData()">Delete All Data</button>

<div class="section">
<h2>Personal Info</h2>

<input id="name" placeholder="Name">
<input id="passport" placeholder="Passport No">
<input id="nationality" placeholder="Nationality">
<input id="dob" placeholder="DD/MM/YYYY">
<input id="passportExpiry" placeholder="DD/MM/YYYY">

</div>

<div class="section">
<h2>Travel</h2>

<input id="arrival" placeholder="DD/MM/YYYY">
<input id="departure" placeholder="DD/MM/YYYY">
<textarea id="address" placeholder="Hotel Address"></textarea>

</div>

<script>

const fields = ["name","passport","nationality","dob","passportExpiry","arrival","departure","address"];

const dateFields = ["dob","passportExpiry","arrival","departure"];

// AUTO DATE FORMAT
function formatDate(value){
  let d = value.replace(/\D/g,"").slice(0,8);
  if(d.length>=5) return d.slice(0,2)+"/"+d.slice(2,4)+"/"+d.slice(4);
  if(d.length>=3) return d.slice(0,2)+"/"+d.slice(2);
  return d;
}

// SAVE
function save(){
  let data={};
  fields.forEach(id=>{
    data[id]=document.getElementById(id).value;
  });
  localStorage.setItem("mdac",JSON.stringify(data));
}

// LOAD
function load(){
  let d=localStorage.getItem("mdac");
  if(!d) return;
  d=JSON.parse(d);
  fields.forEach(id=>{
    if(d[id]) document.getElementById(id).value=d[id];
  });
}

// DELETE
function clearData(){
  if(confirm("Delete all saved data?")){
    localStorage.removeItem("mdac");
    fields.forEach(id=>document.getElementById(id).value="");
  }
}

// VIEW
function showSavedData(){
  alert(localStorage.getItem("mdac") || "No data saved");
}

// OPEN MDAC
function openMDAC(){
  let w=window.open("https://imigresen-online.imi.gov.my/mdac/main?registerMain");
  if(!w) alert("Popup blocked");
}

// EVENTS
fields.forEach(id=>{
  let el=document.getElementById(id);

  el.addEventListener("input",()=>{
    if(dateFields.includes(id)){
      el.value=formatDate(el.value);
    }
    save();
  });
});
