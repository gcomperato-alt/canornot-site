<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can or Not</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
      text-align: center;
      line-height: 1.5;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      color: #444;
    }
    .box {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    input {
      width: 80%;
      padding: 12px;
      font-size: 1rem;
      margin-top: 15px;
    }
    button {
      margin-top: 15px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Can or Not</h1>
  <p>Type your question. Get a straight answer.</p>

  <div class="box">
    <input type="text" placeholder="Can I trust this idea?" />
    <br />
    <button onclick="alert('CAN... or NOT... coming soon.')">Ask</button>
  </div>
</body>
</html>
